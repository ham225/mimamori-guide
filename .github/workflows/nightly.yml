name: 夜間に記事を自動生成

# 毎晩 日本時間 午前2時 (UTC 17:00) に自動実行 + 手動実行もできる
on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 生成した記事をリポジトリに書き戻すため

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonを用意
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ライブラリを導入
        run: pip install -r requirements.txt

      - name: 記事を生成してサイトを再構築
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: 変更をコミットして公開
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles docs data/keywords.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "自動生成: $(date -u +%Y-%m-%d)"
            git push
          fi
